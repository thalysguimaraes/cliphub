name: ClipHub
options:
  bundleIdPrefix: com.thalys
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

settings:
  SWIFT_VERSION: "5"
  DEVELOPMENT_TEAM: ""  # Set your Apple Developer Team ID here

targets:
  ClipHubKit:
    type: framework
    platform: iOS
    sources:
      - ClipHubKit
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.thalys.cliphub.kit
      INFOPLIST_FILE: ClipHubKit/Info.plist

  ClipHub:
    type: application
    platform: iOS
    sources:
      - ClipHub
    dependencies:
      - target: ClipHubKit
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.thalys.cliphub
      INFOPLIST_FILE: ClipHub/Resources/Info.plist
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    entitlements:
      path: ClipHub/ClipHub.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.thalys.cliphub

  TailPasteKeyboard:
    type: app-extension
    platform: iOS
    sources:
      - TailPasteKeyboard
    dependencies:
      - target: ClipHubKit
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.thalys.cliphub.keyboard
      INFOPLIST_FILE: TailPasteKeyboard/Info.plist
    entitlements:
      path: TailPasteKeyboard/TailPasteKeyboard.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.thalys.cliphub

  TailClipShare:
    type: app-extension
    platform: iOS
    sources:
      - TailClipShare
    dependencies:
      - target: ClipHubKit
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.thalys.cliphub.share
      INFOPLIST_FILE: TailClipShare/Info.plist
    entitlements:
      path: TailClipShare/TailClipShare.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.thalys.cliphub

  ClipHubTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - ClipHubTests
    dependencies:
      - target: ClipHubKit
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.thalys.cliphub.tests
