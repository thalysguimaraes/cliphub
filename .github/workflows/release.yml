name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  publish:
    name: Publish Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run go test
        run: go test ./...

      - name: Build deterministic release assets
        run: make release VERSION=${{ github.ref_name }}

      - name: Verify release assets
        run: make release-verify VERSION=${{ github.ref_name }}

      - name: Publish GitHub release assets
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          notes_file="dist/release/cliphub_${RELEASE_TAG}_release_notes.md"

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" dist/release/* --clobber
            gh release edit "$RELEASE_TAG" --title "$RELEASE_TAG" --notes-file "$notes_file"
          else
            gh release create "$RELEASE_TAG" dist/release/* \
              --title "$RELEASE_TAG" \
              --notes-file "$notes_file" \
              --verify-tag
          fi
